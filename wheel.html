  <meta http-equiv="Expires" content="0"/>

  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; height: 100dvh; }
    header { flex-shrink: 0; }

    .wheel-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: 8px 16px 74px;
      overflow: hidden;
      min-height: 0;
    }

    .wheel-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 1.2rem;
      color: var(--text); text-align: center;
      flex-shrink: 0; margin: 0;
    }
    .wheel-subtitle {
      font-size: 0.8rem; color: var(--text2);
      text-align: center; flex-shrink: 0; margin: 0;
    }

    /* wrapper получает точный size от JS */
    .wheel-wrapper {
      position: relative;
      flex-shrink: 0;
    }
    .wheel-pointer {
      position: absolute; top: -10px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 20px solid var(--accent);
      filter: drop-shadow(0 2px 8px rgba(91,156,246,0.9));
      z-index: 10;
    }
    #wheelCanvas {
      width: 100%; height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.06),
                  0 0 40px rgba(91,156,246,0.2),
                  0 8px 32px rgba(0,0,0,0.6);
      display: block;
    }

    .spin-btn {
      flex-shrink: 0;
      padding: 12px 48px; font-size: 1rem;
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      border: none; border-radius: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff; cursor: pointer; letter-spacing: 0.07em;
      box-shadow: 0 4px 20px rgba(91,156,246,0.45);
      transition: transform 0.2s, opacity 0.2s;
      position: relative; overflow: hidden;
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .result-box {
      flex-shrink: 0;
      background: var(--card); border-radius: 14px;
      padding: 10px 24px; text-align: center;
      width: 90%; max-width: 300px;
      border: 1px solid var(--card-border);
      opacity: 0; transform: translateY(10px) scale(0.95);
      transition: opacity 0.45s, transform 0.45s cubic-bezier(0.34,1.3,0.64,1);
      pointer-events: none;
    }
    .result-box.show { opacity: 1; transform: none; pointer-events: auto; }
    .result-emoji { font-size: 1.8rem; line-height: 1.3; }
    .result-label { font-size: 1.15rem; font-weight: 900; }
    .result-label.yes { color: #ef5350; }
    .result-label.no  { color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://images.unsplash.com/photo-1562774053-701939374585?w=120&h=120&fit=crop" alt="эмблема">
    <span data-key="college_name">КГК</span>
  </a>
  <div class="header-controls">
    <div class="lang">
      <button class="lang-btn active" data-lang="ru">РУС</button>
      <button class="lang-btn" data-lang="be">БЕЛ</button>
    </div>
    <button id="theme-toggle" title="Сменить тему"><i class="fa-solid fa-sun"></i></button>
  </div>
</header>

<div class="wheel-main" id="wheelMain">
  <div class="wheel-title">🎡 Колесо фортуны</div>
  <div class="wheel-subtitle">Пусть судьба решит!</div>

  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="wheel-pointer"></div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
  </div>

  <button class="spin-btn" id="spinBtn">КРУТИТЬ!</button>

  <div class="result-box" id="resultBox">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-label" id="resultLabel"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span data-key="nav_home">Главная</span></a>
  <a href="schedule.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i><span data-key="nav_schedule">Расписание</span></a>
  <a href="about.html" class="nav-item"><i class="fa-solid fa-user"></i><span data-key="nav_about">О создателе</span></a>
  <a href="gallery.html" class="nav-item"><i class="fa-solid fa-images"></i><span data-key="nav_gallery">Галерея</span></a>
  <a href="contacts.html" class="nav-item"><i class="fa-solid fa-envelope"></i><span data-key="nav_contacts">Контакты</span></a>
  <a href="wheel.html" class="nav-item active"><i class="fa-solid fa-dharmachakra"></i><span data-key="nav_wheel">Колесо фортуны</span></a>
</nav>

<script src="script.js"></script>
<script>
  /* ── Считаем точный размер колеса ── */
  function calcWheelSize() {
    const main    = document.getElementById("wheelMain");
    const wrapper = document.getElementById("wheelWrapper");

    // Суммарная высота всего кроме wrapper
    // title + subtitle + btn + result + gap*4 + padding
    const OTHER_H = 36 + 22 + 50 + 70 + 40; // ~218px запас
    const availH  = main.clientHeight - OTHER_H;
    const availW  = main.clientWidth  - 32; // padding 16px с каждой стороны

    // Колесо — строгий квадрат, не больше availH и availW
    const size = Math.max(80, Math.min(availH, availW));

    wrapper.style.width  = size + "px";
    wrapper.style.height = size + "px";
  }

  calcWheelSize();
  window.addEventListener("resize", calcWheelSize);

  /* ── Колесо ── */
  const canvas      = document.getElementById("wheelCanvas");
  const ctx         = canvas.getContext("2d");
  const spinBtn     = document.getElementById("spinBtn");
  const resultBox   = document.getElementById("resultBox");
  const resultEmoji = document.getElementById("resultEmoji");
  const resultLabel = document.getElementById("resultLabel");

  const segments = [
    { lines: ["Идём", "в шмагу!"],   bg: "#200808", accent: "#ef5350", isYes: true  },
    { lines: ["Не идём", "в шмагу"], bg: "#082012", accent: "#34d88c", isYes: false }
  ];

  const N = segments.length, SEG = Math.PI;
  let angle = -Math.PI / 2, spinning = false;

  function drawWheel(a) {
    const W = canvas.width, cx = W/2, cy = W/2, R = cx - 8;
    ctx.clearRect(0, 0, W, W);

    segments.forEach((seg, i) => {
      const start = a + i * SEG, end = start + SEG;
      const grd = ctx.createRadialGradient(cx,cy,R*0.1,cx,cy,R);
      grd.addColorStop(0, seg.bg); grd.addColorStop(0.7, seg.bg);
      grd.addColorStop(1, seg.accent + "22");
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,start,end); ctx.closePath();
      ctx.fillStyle = grd; ctx.fill();

      ctx.beginPath(); ctx.arc(cx,cy,R-6,start+0.04,end-0.04);
      ctx.strokeStyle = seg.accent+"60"; ctx.lineWidth = 10; ctx.stroke();

      const cm = (4*R)/(3*Math.PI), midAng = start+SEG/2;
      const tx = cx+cm*Math.cos(midAng), ty = cy+cm*Math.sin(midAng);
      const fs = Math.round(W*0.076), lh = fs*1.55, th = seg.lines.length*lh;
      ctx.save();
      ctx.shadowColor = seg.accent; ctx.shadowBlur = 16;
      ctx.font = `900 ${fs}px 'Montserrat',sans-serif`;
      ctx.fillStyle = seg.accent; ctx.textAlign="center"; ctx.textBaseline="middle";
      seg.lines.forEach((line,li) => ctx.fillText(line, tx, ty-th/2+li*lh+lh/2));
      ctx.restore();
    });

    for (let i=0;i<N;i++) {
      const la=a+i*SEG;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+R*Math.cos(la),cy+R*Math.sin(la));
      ctx.strokeStyle="rgba(0,0,0,0.8)"; ctx.lineWidth=4; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI);
    ctx.strokeStyle="rgba(91,156,246,0.3)"; ctx.lineWidth=10; ctx.stroke();

    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.09);
    gr.addColorStop(0,"#fff"); gr.addColorStop(0.4,"#5b9cf6"); gr.addColorStop(1,"#0a0a0f");
    ctx.beginPath(); ctx.arc(cx,cy,W*0.09,0,2*Math.PI);
    ctx.fillStyle=gr; ctx.fill();
    ctx.shadowColor="#5b9cf6"; ctx.shadowBlur=20;
    ctx.strokeStyle="rgba(91,156,246,0.6)"; ctx.lineWidth=3; ctx.stroke();
    ctx.shadowBlur=0;
  }

  drawWheel(angle);

  spinBtn.addEventListener("click", () => {
    if (spinning) return;
    spinning=true; spinBtn.disabled=true;
    resultBox.classList.remove("show");
    if (navigator.vibrate) navigator.vibrate([30,30,60]);

    const winner = Math.random()<0.5?0:1;
    const target = -Math.PI/2 - winner*SEG - SEG/2 - angle;
    const fullSpins = (7+Math.floor(Math.random()*5))*2*Math.PI;
    const totalRot  = fullSpins+((target%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
    const duration  = 5000+Math.random()*1000;
    const startAngle=angle, startTime=performance.now();
    let lastSeg=-1;

    function easeOut(t){return 1-Math.pow(1-t,3.5);}
    function tick(now){
      const t=Math.min((now-startTime)/duration,1);
      angle=startAngle+totalRot*easeOut(t);
      drawWheel(angle);
      const cur=Math.floor(((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/Math.PI);
      if(cur!==lastSeg){if(navigator.vibrate)navigator.vibrate(8);lastSeg=cur;}
      if(t<1){requestAnimationFrame(tick);}
      else{
        angle=startAngle+totalRot; drawWheel(angle);
        spinning=false; spinBtn.disabled=false;
        if(navigator.vibrate)navigator.vibrate([80,40,120]);
        resultEmoji.textContent=segments[winner].isYes?"😭":"🍺";
        resultLabel.textContent=segments[winner].isYes?"Идём в шмагу!":"Не идём в шмагу";
        resultLabel.className="result-label "+(segments[winner].isYes?"yes":"no");
        resultBox.classList.add("show");
      }
    }
    requestAnimationFrame(tick);
  });
</script>
</body>
</html>
